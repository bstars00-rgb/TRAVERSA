# TRAVERSA AI — GitHub Pages 자동 배포
# main 브랜치 push 시 lint → test → build → Pages 배포
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 지원

# 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 — 진행 중인 배포가 있으면 대기 (취소하지 않음)
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        # 프로젝트 Pages는 /<repository-name>/ 에서 서빙된다.
        # 커스텀 도메인/루트 배포로 바꾸면 VITE_BASE_PATH를 "/"로 설정할 것.
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
